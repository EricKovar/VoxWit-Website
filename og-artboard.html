<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OG Artboard</title>
  <style>
    html,body { margin:0; padding:0; }
    .artboard {
      width: 1200px; height: 630px;
      display: flex; align-items: center; justify-content: center;
      background: #07111f;
      position: relative; font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif;
      color: white; overflow: hidden;
    }
    .blob{position:absolute; border-radius:50%; filter: blur(80px); opacity:0.35}
    .b1{width:520px;height:520px;left:-80px;top:-60px;background:#22d3ee}
    .b2{width:620px;height:620px;right:-120px;top:40px;background:#a78bfa}
    .b3{width:520px;height:520px;left:240px;bottom:-160px;background:#34d399}
    .card{position:relative; z-index:2; display:flex; align-items:center; gap:28px; padding:40px 56px; border-radius:28px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); backdrop-filter: blur(8px);
      box-shadow: 0 30px 120px rgba(0,0,0,0.45);
    }
    .mark{width:92px; height:92px; border-radius:22px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:40px; color:#0f172a;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      box-shadow: 0 10px 40px rgba(34,211,238,0.35);
    }
    .title{font-size:56px; font-weight:800; letter-spacing:-0.02em; line-height:1.02}
    .subtitle{margin-top:8px; font-size:20px; color:#cbd5e1}
    .grad{background: linear-gradient(90deg,#67e8f9,#ffffff,#c4b5fd); -webkit-background-clip: text; background-clip:text; color:transparent}
  </style>
</head>
<body>
  <div class="artboard">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="card">
      <div class="mark">V</div>
      <div>
        <div class="title">VoxWit — <span class="grad">Optimize for attention</span></div>
        <div class="subtitle">Turn everyday writing into measurable engagement.</div>
      </div>
    </div>
  </div>
</body>
</html>
