<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OG Light</title>
  <style>
    html,body { margin:0; padding:0; }
    .artboard {
      width: 1200px; height: 630px;
      display: flex; align-items: center; justify-content: center;
      background: #F7FAFC;
      position: relative; font-family: Inter, -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color: #0F172A; overflow: hidden;
    }
    .card{position:relative; z-index:2; display:flex; align-items:center; gap:28px; padding:40px 56px; border-radius:28px;
      background: rgba(255,255,255,0.85); border: 1px solid rgba(15,23,42,0.08); box-shadow: 0 30px 120px rgba(0,0,0,0.08);
    }
    .mark{width:92px; height:92px; border-radius:22px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:40px; color:#0f172a;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
    }
    .title{font-size:56px; font-weight:900; letter-spacing:-0.02em; line-height:1.02}
    .subtitle{margin-top:8px; font-size:20px; color:#334155}
    .grad{background: linear-gradient(90deg,#06b6d4,#4f46e5); -webkit-background-clip: text; background-clip:text; color:transparent}
  </style>
</head>
<body>
  <div class="artboard">
    <div class="card">
      <div class="mark">V</div>
      <div>
        <div class="title">VoxWit — <span class="grad">Optimize for attention</span></div>
        <div class="subtitle">Turn everyday writing into measurable engagement.</div>
      </div>
    </div>
  </div>
</body>
</html>
